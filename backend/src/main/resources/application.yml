# 服务器配置
server:
  port: 8081
  servlet:
    context-path: /api

# Spring配置
spring:
  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/anime_creator?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root # 请修改为你的MySQL用户名
    password: root # 请修改为你的MySQL密码
  
  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

# MyBatis Plus配置
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.anime.creator.model
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl # 开启SQL日志，生产环境可关闭
  global-config:
    db-config:
      id-type: auto

# Xxl-Job配置
xxl:
  job:
    # 调度中心部署跟地址 [选填]：如调度中心集群部署存在多个地址则用逗号分隔。
    admin:
      addresses: http://127.0.0.1:8080/xxl-job-admin # 请修改为你的xxl-job调度中心地址
    # 执行器通讯TOKEN [选填]：非空时启用；需要与调度中心配置保持一致
    accessToken: default_token
    # 执行器配置
    executor:
      appname: anime-creator-executor # 执行器AppName
      address:
      ip:
      port: 9999 # 执行器端口号
      logpath: /data/applogs/xxl-job/jobhandler
      logretentiondays: 30
