# 服务器配置
server:
  port: 8081
  servlet:
    context-path: /api
    session:
      cookie:
        http-only: false
        same-site: lax

# Spring配置
spring:
  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/anime_creator?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root # 请修改为你的MySQL用户名
    password: As+FjsU:9FdS # 请修改为你的MySQL密码
  
  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

# MyBatis Plus配置
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.anime.creator.model
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl # 开启SQL日志，生产环境可关闭
  global-config:
    db-config:
      id-type: auto

# Xxl-Job配置
xxl:
  job:
    admin:
      addresses: ''   # 改为空，本地不用调度中心
    accessToken: ''
    executor:
      appname: anime-creator-executor
      address: ''
      ip: ''
      port: -1        # 改为 -1，禁用执行器端口
      logpath: ./logs/xxl-job
      logretentiondays: 30
# 成果文件存储路径（确保该目录存在，或程序会自动创建）
storage:
    path: C:/Users/shijunwei/anime-storage
